<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="WhatshApp Mee">
<meta property="og:description" content="Chattmee">
<meta property="og:image" content="https://thumbsnap.com/i/iVo9zNDo.jpg">
<meta property="og:type" content="website">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    overflow: hidden;
    color: white;
}

/* VIDEO */
.bg-video {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    top: 0;
    left: 0;
    z-index: -2;
    transition: all 0.6s ease;
}

/* OVERLAY */
body::after {
    content: "";
    position: fixed;
    width:100%; height:100%;
    background: rgba(0,0,0,0.25);
    z-index: -1;
}

/* HEADER */
.whatsapp-header {
    display: flex;
    align-items: center;
    padding: 10px;
    background: rgba(0,0,0,0.15);
}

/* CONTENT */
.blur-content {
    text-align: center;
    padding: 20px;
    margin-top: 90px;
}

/* TEXT */
.group-name {
    font-size: 24px;
    font-weight: bold;
}

.group-info {
    font-size: 14px;
}

.promo-text {
    font-size: 15px;
    margin: 15px 0;
}

/* COUNTER */
.stats {
    display: flex;
    justify-content: center;
    gap: 50px;
    margin: 15px 0;
}

.number {
    font-size: 20px;
    font-weight: bold;
}

/* ONLINE */
.online-label {
    display: flex;
    align-items: center;
    gap: 5px;
}

.online-dot {
    width: 7px;
    height: 7px;
    background: #00ff6a;
    border-radius: 50%;
    animation: blink 1s infinite;
}

@keyframes blink {
    0% {opacity:1;}
    50% {opacity:0.3;}
    100% {opacity:1;}
}

/* COUNTDOWN */
.countdown {
    font-size: 14px;
    margin-top: 10px;
}

/* SPACE */
.safe-space {
    height: 180px;
}

/* BUTTON */
.sticky-buttons {
    position: fixed;
    bottom: 110px;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.join-button,
.exit-button {
    min-width: 240px;
    padding: 15px 22px;
    border-radius: 50px;
    border: none;
    color: white;
    font-size: 17px;
    cursor: pointer;
    margin: 8px;
}

.join-button {
    background: #25D366;
    animation: pulse 1.5s infinite;
}

.exit-button {
    background: #ff2d2d;
}

@keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.07); }
    100% { transform: scale(1); }
}

/* CHAT */
.chat-container {
    position: fixed;
    bottom: 260px;
    left: 15px;
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.chat-bubble {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(0,0,0,0.75);
    padding: 8px 10px;
    border-radius: 14px;
    max-width: 260px;
    font-size: 13px;
    animation: fadeUp 0.3s ease;
}

.chat-avatar {
    width: 28px;
    height: 28px;
    border-radius: 50%;
}

.chat-name {
    font-weight: bold;
    font-size: 12px;
}

@keyframes fadeUp {
    from {opacity:0; transform: translateY(10px);}
    to {opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline id="bgVideo"></video>

<div class="whatsapp-header">
    <div style="margin-right:10px;"><i class="fas fa-arrow-left"></i></div>
    <div>
        <b>Naughty Girls Room</b><br>
        <small>WhatsApp</small>
    </div>
</div>

<div class="blur-content">

    <div class="group-name">Naughty Girls Room</div>
    <div class="group-info">Admin: Emily Whitney</div>

    <div class="promo-text">
        🔥 Join now and see what everyone is talking about<br>
        ⚡ Limited access — only active users can enter
    </div>

    <div class="stats">
        <div>
            <div class="number" id="members">130,707</div>
            <div>Members</div>
        </div>
        <div>
            <div class="number" id="online">50,856</div>
            <div class="online-label">
                <span class="online-dot"></span> Online
            </div>
        </div>
    </div>

    <!-- COUNTDOWN -->
    <div class="countdown">
        Redirecting in <span id="time">20</span>s...
    </div>

    <div class="safe-space"></div>

</div>

<div class="sticky-buttons">
    <button class="join-button" onclick="goLink()">
        <i class="fab fa-whatsapp"></i> Join the group
    </button>

    <button class="exit-button" onclick="window.location.href='https://link.trf7.com/s/ce14250dd3cd4?preland=Adult&subsource=7'">
        <i class="fas fa-times"></i> No Thanks
    </button>
</div>

<!-- CHAT -->
<div class="chat-container" id="chatContainer"></div>

<script>

/* VIDEO SWIPE */
const videos = [
 'https://mylivecams.github.io/Datavidios/vidio1.mp4',
 'https://mylivecams.github.io/Datavidios/vidio2.mp4',
 'https://mylivecams.github.io/Datavidios/vidio3.mp4',
 'https://mylivecams.github.io/Datavidios/vidio4.mp4'
];

let video = document.getElementById("bgVideo");
let index = 0;
video.src = videos[index];

setInterval(() => {
    index = (index + 1) % videos.length;

    video.style.transform = "translateY(-100%) scale(1.1)";
    video.style.opacity = 0;

    setTimeout(() => {
        video.src = videos[index];
        video.load();
        video.play();

        video.style.transform = "translateY(100%) scale(1.1)";

        setTimeout(() => {
            video.style.transform = "translateY(0)";
            video.style.opacity = 1;
        }, 50);

    }, 400);

}, 5000);

/* COUNTDOWN */
let timeLeft = 20;

let timer = setInterval(() => {
    timeLeft--;
    document.getElementById("time").innerText = timeLeft;

    if (timeLeft <= 0) {
        clearInterval(timer);
        document.querySelector('.join-button').innerHTML = "Connecting...";
        setTimeout(() => {
            window.location.href = "https://link.trf7.com/s/ce14250dd3cd4?preland=Adult&subsource=7";
        }, 500);
    }
}, 1000);

/* CHAT */
const names = ["Emma","Olivia","Sophia","Ava","Isabella","Mia","Charlotte","Amelia","Harper","Evelyn","Liam","Noah","James","Lucas","Benjamin","Henry"];

const messages = [
    "Join now 🔥",
    "This room is very active 😈",
    "Many users are online right now",
    "Don't miss out!",
    "People are joining fast 🚀",
    "Limited access available ⚡",
    "You're almost in…",
    "Hurry up before it's full!"
];

const avatars = [
    "https://i.pravatar.cc/40?img=1",
    "https://i.pravatar.cc/40?img=2",
    "https://i.pravatar.cc/40?img=3",
    "https://i.pravatar.cc/40?img=4",
    "https://i.pravatar.cc/40?img=5"
];

const container = document.getElementById("chatContainer");

setInterval(()=>{
    let name = names[Math.floor(Math.random()*names.length)];
    let msg = messages[Math.floor(Math.random()*messages.length)];
    let avatar = avatars[Math.floor(Math.random()*avatars.length)];

    let chat = document.createElement("div");
    chat.className = "chat-bubble";

    chat.innerHTML = `
        <img src="${avatar}" class="chat-avatar">
        <div>
            <div class="chat-name">${name}</div>
            <div>${msg}</div>
        </div>
    `;

    container.prepend(chat);

    if(container.children.length > 3){
        container.removeChild(container.lastChild);
    }

}, 2500);

/* BUTTON */
function goLink(){
    window.location.href = "https://link.trf7.com/s/ce14250dd3cd4?preland=Adult&subsource=7";
}

</script>

</body>
</html>
